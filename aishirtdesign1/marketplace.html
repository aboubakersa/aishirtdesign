<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasmimak | Community Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-cyan: #00b8e6; --brand-cyan-dark: #008eb3; --brand-cyan-light: #e6f9ff;
            --bg-body: #f4f7fb; --bg-surface: #ffffff; --bg-tinted-blue: #f0f7ff;
            --text-dark: #0f172a; --text-main: #334155; --text-muted: #94a3b8;
            --border-light: #e2e8f0; --shadow-sm: 0 4px 6px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 20px rgba(0,0,0,0.05); --shadow-floating: 0 30px 60px rgba(0, 50, 100, 0.12);
            --success: #10b981; --danger: #ef4444; --star-active: #f59e0b; --star-inactive: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-body); background-image: url('assets/background.png'); background-size: cover; background-position: center; background-attachment: fixed; height: 100vh; display: flex; overflow: hidden; color: var(--text-main); }

        .app-container { display: flex; width: 95%; max-width: 1600px; margin: 3vh auto 0; height: 94vh; gap: 25px; }

        /* SIDEBAR */
        .sidebar { width: 95px; background: var(--bg-tinted-blue); border-radius: 28px; display: flex; flex-direction: column; padding: 25px 20px; box-shadow: var(--shadow-floating); flex-shrink: 0; position: relative; overflow-x: hidden; overflow-y: auto; border: 1px solid rgba(255,255,255,0.9); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease; white-space: nowrap; }
        .sidebar:hover { width: 290px; padding: 25px 25px; }
        .sidebar::-webkit-scrollbar { width: 0px; }
        .hide-on-collapse { opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; margin-left: 12px; }
        .sidebar:hover .hide-on-collapse { opacity: 1; visibility: visible; }
        .brand-logo { display: flex; align-items: center; font-size: 1.3rem; font-weight: 800; color: var(--text-dark); margin-bottom: 35px; padding: 0 5px; letter-spacing: -0.5px; }
        .brand-logo img { width: 80px; height: 80px; min-width: 80px; border-radius: 12px; margin-left: -18px; filter: drop-shadow(0 6px 10px rgba(3, 3, 3, 0.25)); }
        
        .nav-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: var(--text-muted); letter-spacing: 1px; margin: 10px 0 15px 10px; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { display: flex; align-items: center; padding: 12px 10px; border-radius: 12px; color: var(--text-main); font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
        .nav-item svg { width: 22px; height: 22px; color: var(--text-muted); min-width: 22px; margin-left: 4px; transition: color 0.2s;}
        .nav-item:hover { background: #ffffff; color: var(--text-dark); box-shadow: var(--shadow-sm); }
        .nav-item.active { background: var(--brand-cyan-light); color: var(--brand-cyan-dark); box-shadow: var(--shadow-sm); }
        .nav-item.active svg { color: var(--brand-cyan); }
        .nav-item.danger:hover { background: #fef2f2; color: var(--danger); }
        .nav-item.danger:hover svg { color: var(--danger); }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-radius: 28px; background: var(--bg-surface); box-shadow: var(--shadow-floating); border: 1px solid rgba(255, 255, 255, 0.9); }
        
        /* HEADER AREA */
        .top-bar { display: flex; flex-direction: column; padding: 25px 40px 15px; background: var(--bg-tinted-blue); border-bottom: 1px solid var(--border-light); gap: 15px; }
        .header-top-row { display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.6rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;}
        .sort-select { padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border-light); background: white; font-weight: 600; color: var(--text-dark); outline: none; cursor: pointer; font-size: 0.9rem; }

        .filter-row { display: flex; align-items: center; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .filter-row::-webkit-scrollbar { height: 0px; }
        .filter-label { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; min-width: 80px; }
        
        .cat-btn { padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border-light); background: white; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .cat-btn.active { background: var(--text-dark); color: white; border-color: var(--text-dark); }
        
        .tag-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--brand-cyan-light); background: var(--bg-body); color: var(--brand-cyan-dark); font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .tag-btn.active { background: var(--brand-cyan); color: white; border-color: var(--brand-cyan); }

        .content-scroll { flex: 1; padding: 30px 40px; overflow-y: auto; background: var(--bg-surface); }
        .content-scroll::-webkit-scrollbar { width: 8px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* MARKETPLACE GRID */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .market-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
        .market-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); border-color: var(--brand-cyan-light); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .creator-info { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 4px 8px; border-radius: 12px; transition: 0.2s; margin-left: -8px;}
        .creator-info:hover { background: var(--bg-tinted-blue); }
        .creator-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-body); color: var(--text-dark); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 800; border: 1px solid var(--border-light); }
        .creator-name { font-weight: 800; font-size: 0.95rem; color: var(--text-dark); }
        
        .market-card-img-wrapper { position: relative; width: 100%; height: 300px; margin-bottom: 15px; }
        .market-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; background: #f8fafc; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s;}
        .market-card img:hover { opacity: 0.95; }
        
        /* NEW: Favorites Heart */
        .favorite-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.95); backdrop-filter: blur(4px); border: none; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .favorite-btn:hover { transform: scale(1.1); color: var(--danger); }
        .favorite-btn.active { color: var(--danger); fill: var(--danger); }

        .product-badge { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); padding: 5px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; color: var(--text-dark); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .star-container { display: flex; gap: 3px; }
        .star-container svg { width: 18px; height: 18px; cursor: pointer; color: var(--star-inactive); transition: 0.2s; }
        .star-container svg.filled { color: var(--star-active); fill: var(--star-active); }
        .star-container svg:hover { transform: scale(1.15); }

        .market-caption { font-size: 1rem; font-weight: 800; color: var(--text-dark); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .card-tag-pill { background: var(--bg-body); color: var(--text-muted); font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-light); }

        .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-light); }
        .market-price { font-weight: 800; color: var(--brand-cyan-dark); font-size: 1.2rem; }
        .btn-order-small { background: var(--text-dark); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .btn-order-small:hover { background: #000000; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

        /* MODALS (Simplified for brevity, uses your exact styles) */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: white; padding: 40px; border-radius: 28px; width: 90%; max-width: 550px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-height: 90vh; overflow-y: auto; position: relative;}
        .modal-overlay.active .modal-card { transform: translateY(0); }
        .close-modal { position: absolute; top: 25px; right: 25px; background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: var(--danger); transform: scale(1.1); }
        .modal-title { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 25px; color: var(--text-dark); letter-spacing: -0.5px;}
        .modal-form-group { margin-bottom: 20px; }
        .modal-form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px;}
        .modal-form-group input, .modal-form-group select { width: 100%; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--border-light); background: var(--bg-body); font-size: 0.95rem; color: var(--text-dark); font-weight: 500; outline: none; }
        .modal-actions { display: flex; gap: 15px; margin-top: 35px; }
        .modal-btn { flex: 1; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; text-align: center; border: none; font-size: 1.05rem; transition: all 0.2s;}
        .modal-btn.primary { background: var(--brand-cyan); color: white;}
        .modal-btn.secondary { background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-light);}
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 16px 24px; border-radius: 12px; color: white; font-weight: 700; font-size: 0.95rem; box-shadow: 0 10px 25px rgba(0,0,0,0.15); animation: toastIn 0.3s forwards; display: flex; align-items: center; gap: 10px; }
        .toast.success { background: var(--success); } .toast.error { background: var(--danger); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand-logo"><img src="assets/logo.png" onerror="this.src='https://placehold.co/50x50/00b8e6/ffffff?text=AI'"><span class="hide-on-collapse">Tasmimak</span></div>
            <div class="nav-label"><span class="hide-on-collapse">Main Menu</span></div>
            <div class="nav-menu">
                <div class="nav-item" onclick="window.location.href='aichat.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span class="hide-on-collapse">Workspace</span>
                </div>
                <div class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span class="hide-on-collapse">Marketplace</span>
                </div>
                <div class="nav-item" onclick="window.location.href='profile.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg><span class="hide-on-collapse">My Profile</span>
                </div>
            </div>
            <div class="nav-menu" style="margin-top: auto;">
                <div class="nav-item danger" onclick="logoutUser()" style="margin-top: 15px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span class="hide-on-collapse">Disconnect</span></div>
            </div>
        </aside>

        <main class="main-wrapper">
            <header class="top-bar">
                <div class="header-top-row">
                    <div class="header-title"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg> Discover Designs</div>
                    <select class="sort-select" id="sortSelect" onchange="window.handleSortChange()">
                        <option value="newest">Sort by Newest</option>
                        <option value="most_viewed">Most Viewed</option>
                        <option value="highest_rated">Highest Rated</option>
                    </select>
                </div>
                
                <div class="filter-row">
                    <span class="filter-label">Product</span>
                    <button class="cat-btn active" onclick="window.applyCatFilter('All', this)">All</button>
                    <button class="cat-btn" onclick="window.applyCatFilter('T-Shirt', this)">T-Shirts</button>
                    <button class="cat-btn" onclick="window.applyCatFilter('Hoodie', this)">Hoodies</button>
                    <button class="cat-btn" onclick="window.applyCatFilter('Sweatshirt', this)">Sweatshirts</button>
                    <button class="cat-btn" onclick="window.applyCatFilter('Chemise', this)">Chemise</button>
                </div>
                <div class="filter-row" style="margin-top: -5px;">
                    <span class="filter-label">Style Tags</span>
                    <button class="tag-btn active" onclick="window.applyTagFilter('All', this)">#All</button>
                    <button class="tag-btn" onclick="window.applyTagFilter('Anime', this)">#Anime</button>
                    <button class="tag-btn" onclick="window.applyTagFilter('Illustration', this)">#Illustration</button>
                    <button class="tag-btn" onclick="window.applyTagFilter('Fashion', this)">#Fashion</button>
                    <button class="tag-btn" onclick="window.applyTagFilter('Streetwear', this)">#Streetwear</button>
                    <button class="tag-btn" onclick="window.applyTagFilter('Minimalist', this)">#Minimalist</button>
                </div>
            </header>

            <div class="content-scroll">
                <div class="market-grid" id="marketGridList">
                    <p style="color: var(--text-muted); font-weight: 600;">Loading public designs...</p>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="orderModal">
        <div class="modal-card">
            <button class="close-modal" onclick="window.closeOrderModal()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <h3 class="modal-title">Complete Order</h3>
            <div style="text-align: center; margin-bottom: 20px;"><img id="modalPreviewImg" src="" style="max-width: 150px; border-radius: 12px; border: 2px solid var(--border-light);"></div>
            <div style="display: flex; gap: 15px;">
                <div class="modal-form-group" style="flex: 1;"><label>Size</label><select id="orderSize"><option value="" disabled selected>Size</option><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select></div>
                <div class="modal-form-group" style="flex: 2;"><label>Wilaya</label><select id="orderWilaya"><option value="16 - Alger">16 - Alger</option><option value="31 - Oran">31 - Oran</option></select></div>
            </div>
            <div class="modal-form-group"><label>Full Name</label><input type="text" id="orderName" required></div>
            <div class="modal-form-group"><label>Phone</label><input type="tel" id="orderPhone" required></div>
            <div class="modal-form-group"><label>Address</label><input type="text" id="orderAddress" required></div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="window.closeOrderModal()">Cancel</button>
                <button class="modal-btn primary" id="confirmOrderBtn" onclick="window.submitOrder()">Submit Order</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-card" style="text-align: center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" style="width: 80px; height: 80px; margin: 0 auto 20px; display:block;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <h3 class="modal-title" style="margin-bottom: 10px;">Success!</h3>
            <p style="color: var(--text-muted); margin-bottom: 35px;">Order submitted to the workshop.</p>
            <button class="modal-btn primary" style="width: 100%;" onclick="document.getElementById('successModal').classList.remove('active')">Continue Browsing</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXZYUmaoG1hsAcxp-Q8IDj7X7GCDnOZ1Q",
            authDomain: "aishirtdesign-c7c3d.firebaseapp.com",
            projectId: "aishirtdesign-c7c3d",
            storageBucket: "aishirtdesign-c7c3d.firebasestorage.app",
            messagingSenderId: "907151824372",
            appId: "1:907151824372:web:263a142178f93dc9e095a1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allMarketData = []; 
        let currentUserFavorites = []; // NEW: Store current user's wishlist
        let currentSort = 'newest';
        let activeCatFilter = 'All';
        let activeTagFilter = 'All';
        let selectedMarketItem = null;

        window.showToast = function(msg, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                currentUser = user; 
                // Fetch User Favorites in Realtime
                onSnapshot(doc(db, 'users', user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        currentUserFavorites = docSnap.data().favorites || [];
                        renderGrid(); // Re-render to show updated hearts
                    }
                });
                loadMarketplace(); 
            } else { 
                window.location.href = 'login.html'; 
            }
        });

        window.logoutUser = async function() { await signOut(auth); window.location.href = 'login.html'; };

        // --- FILTER LOGIC ---
        window.applyCatFilter = function(category, btnElement) {
            activeCatFilter = category;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderGrid();
        };

        window.applyTagFilter = function(tag, btnElement) {
            activeTagFilter = tag;
            document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderGrid();
        };

        window.handleSortChange = function() {
            currentSort = document.getElementById('sortSelect').value;
            renderGrid();
        };

        // --- NEW: SECURE RATING LOGIC ---
        window.rateItem = async function(docId, starValue) {
            try {
                const item = allMarketData.find(d => d.id === docId);
                let userRatingsMap = item.userRatings || {}; // E.g. { "uid1": 5, "uid2": 3 }
                
                userRatingsMap[currentUser.uid] = starValue; // Add or Replace their rating!

                // Calculate the true average based on all unique users
                const ratingsArray = Object.values(userRatingsMap);
                const newCount = ratingsArray.length;
                const newTotal = ratingsArray.reduce((acc, val) => acc + val, 0);
                const newAverage = (newTotal / newCount).toFixed(1);

                await updateDoc(doc(db, 'marketplace', docId), { 
                    userRatings: userRatingsMap, 
                    ratingCount: newCount, 
                    averageRating: parseFloat(newAverage) 
                });
                showToast("Rating saved!", "success");
            } catch (e) { showToast("Failed to submit rating.", "error"); }
        };

        // --- NEW: WISHLIST / FAVORITE LOGIC ---
        window.toggleFavorite = async function(docId) {
            try {
                const userRef = doc(db, 'users', currentUser.uid);
                let updatedFavorites = [...currentUserFavorites];
                
                if (updatedFavorites.includes(docId)) {
                    // Remove it
                    updatedFavorites = updatedFavorites.filter(id => id !== docId);
                    showToast("Removed from Wishlist", "success");
                } else {
                    // Add it
                    updatedFavorites.push(docId);
                    showToast("Added to Wishlist", "success");
                }
                await updateDoc(userRef, { favorites: updatedFavorites });
            } catch(e) { console.error(e); }
        };

        function loadMarketplace() {
            onSnapshot(collection(db, 'marketplace'), (snap) => {
                allMarketData = [];
                snap.forEach(doc => allMarketData.push({ id: doc.id, ...doc.data() }));
                renderGrid();
            });
        }

function renderGrid() {
            const grid = document.getElementById('marketGridList');
            grid.innerHTML = '';
            
            let filteredData = allMarketData.filter(item => {
                let matchCat = activeCatFilter === 'All' ? true : (item.productType && item.productType.includes(activeCatFilter));
                let matchTag = activeTagFilter === 'All' ? true : ((item.tags && item.tags.includes(activeTagFilter)) || (item.caption && item.caption.toLowerCase().includes(activeTagFilter.toLowerCase())));
                return matchCat && matchTag;
            });

            if (currentSort === 'newest') filteredData.sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
            else if (currentSort === 'most_viewed') filteredData.sort((a,b) => (b.views || 0) - (a.views || 0));
            else if (currentSort === 'highest_rated') filteredData.sort((a,b) => (b.averageRating || 0) - (a.averageRating || 0));

            if(filteredData.length === 0) {
                grid.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-weight: 600; grid-column: 1 / -1; padding-top: 50px;">No designs match these filters.</div>`;
                return;
            }

            filteredData.forEach(data => {
                
                // --- THIS IS THE FIX YOU MISSED ---
                let authorName = data.creatorName || 'Anonymous';
                if (authorName.includes('undefined')) {
                    authorName = authorName.replace('undefined', '').trim();
                }
                // ----------------------------------

                const initial = authorName.charAt(0).toUpperCase();
                const avgRating = data.averageRating || 0;
                const views = data.views || 0;

                // Check if user has already rated this
                const userHasRated = data.userRatings && data.userRatings[currentUser.uid] ? data.userRatings[currentUser.uid] : 0;

                let starsHtml = '';
                for(let i=1; i<=5; i++) {
                    const isFilled = i <= Math.round(avgRating) ? 'filled' : '';
                    const userHighlight = i <= userHasRated ? 'fill: var(--star-active); opacity: 1;' : '';
                    starsHtml += `<svg class="${isFilled}" style="${userHighlight}" onclick="window.rateItem('${data.id}', ${i})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 6.91 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
                }

                let tagsHtml = '';
                if(data.tags && Array.isArray(data.tags)) data.tags.forEach(tag => { tagsHtml += `<span class="card-tag-pill">#${tag}</span>`; });

                const isFav = currentUserFavorites.includes(data.id);
                const heartClass = isFav ? 'favorite-btn active' : 'favorite-btn';
                const heartFill = isFav ? 'currentColor' : 'none';

                const item = document.createElement('div');
                item.className = 'market-card';
                item.innerHTML = `
                    <div class="card-header">
                        <div class="creator-info" onclick="window.location.href='profile.html?id=${data.creatorId}'">
                            <div class="creator-avatar">${initial}</div>
                            <span class="creator-name">${authorName}</span>
                        </div>
                    </div>

                    <div class="market-card-img-wrapper">
                        <span class="product-badge">${data.productType || 'Apparel'}</span>
                        <button class="${heartClass}" onclick="window.toggleFavorite('${data.id}')">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="${heartFill}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        </button>
                        <img src="${data.imageUrl}" onclick='window.trackView("${data.id}")'>
                    </div>
                    
                    <div class="stats-row">
                        <div class="star-container" title="You rated this ${userHasRated} stars">${starsHtml} <span style="margin-left: 5px; color: var(--text-dark);">${avgRating}</span></div>
                        <div style="display:flex; align-items:center; gap:5px;"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>${views}</div>
                    </div>

                    <div class="market-caption">${data.caption || 'AI Generated Design'}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    
                    <div class="card-actions">
                        <div class="market-price">${data.basePrice || 2490} DZD</div>
                        <button class="btn-order-small" onclick='window.prepareMarketOrder(${JSON.stringify(data).replace(/'/g, "\\'")})'>
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Order
                        </button>
                    </div>
                `;
                grid.appendChild(item);
            });
        }
        window.trackView = async function(docId) { try { await updateDoc(doc(db, 'marketplace', docId), { views: increment(1) }); } catch(e) {} };
        window.prepareMarketOrder = function(data) { selectedMarketItem = data; document.getElementById('modalPreviewImg').src = data.imageUrl; document.getElementById('orderModal').classList.add('active'); };
        window.closeOrderModal = () => document.getElementById('orderModal').classList.remove('active');

        window.submitOrder = async function() {
            const size = document.getElementById('orderSize').value;
            const wilaya = document.getElementById('orderWilaya').value;
            const name = document.getElementById('orderName').value.trim();
            const phone = document.getElementById('orderPhone').value.trim();
            const address = document.getElementById('orderAddress').value.trim();
            
            if(!size || !wilaya || !name || !phone || !address) return showToast("Please fill all fields.", "error");
            
            const btn = document.getElementById('confirmOrderBtn'); btn.innerText = "Processing..."; btn.disabled = true;

            try {
                await addDoc(collection(db, 'users', currentUser.uid, 'orders'), {
                    imageUrl: selectedMarketItem.imageUrl, size: size, wilaya: wilaya, customerName: name, phone: phone, address: address,
                    productType: selectedMarketItem.productType || 'T-Shirt', material: selectedMarketItem.material || 'Standard', 
                    price: selectedMarketItem.basePrice || 2490, status: 'Pending', timestamp: serverTimestamp()
                });
                closeOrderModal(); document.getElementById('successModal').classList.add('active');
            } catch(e) { showToast("Order failed.", "error"); } finally { btn.innerText = "Submit Order"; btn.disabled = false; }
        };
    </script>
</body>
</html>
